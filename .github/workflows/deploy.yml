name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"

env:
  PROJECT_ID: ai-newsletter-2026
  REGION: us-central1
  SERVICE: newsletter-backend
  REGISTRY: us-central1-docker.pkg.dev

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/newsletter/${{ env.SERVICE }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/newsletter/${{ env.SERVICE }}:latest \
            ./backend

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/newsletter/${{ env.SERVICE }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/newsletter/${{ env.SERVICE }}:latest

      - name: Write env vars file
        run: |
          cat > /tmp/env-vars.yaml << 'ENVEOF'
          GOOGLE_API_KEY: "${{ secrets.GOOGLE_API_KEY }}"
          GCP_PROJECT_ID: "${{ secrets.GCP_PROJECT_ID }}"
          GCS_BUCKET_NAME: "${{ secrets.GCS_BUCKET_NAME }}"
          RESEND_API_KEY: "${{ secrets.RESEND_API_KEY }}"
          RESEND_FROM_EMAIL: "${{ secrets.RESEND_FROM_EMAIL }}"
          FIREBASE_PROJECT_ID: "${{ secrets.FIREBASE_PROJECT_ID }}"
          INTERNAL_SECRET: "${{ secrets.INTERNAL_SECRET }}"
          ALLOWED_ORIGINS: "${{ secrets.ALLOWED_ORIGINS }}"
          GMAIL_USER: "${{ secrets.GMAIL_USER }}"
          GMAIL_APP_PASSWORD: "${{ secrets.GMAIL_APP_PASSWORD }}"
          PEXELS_API_KEY: "${{ secrets.PEXELS_API_KEY }}"
          NEWSLETTER_PREPARE_LEAD_MINUTES: "7"
          ENVEOF

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/newsletter/${{ env.SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 1 \
            --timeout 600 \
            --concurrency 10 \
            --no-cpu-throttling \
            --min-instances 0 \
            --max-instances 5 \
            --env-vars-file /tmp/env-vars.yaml

      - name: Print service URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format "value(status.url)"
